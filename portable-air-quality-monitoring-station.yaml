  # Derived
  - platform: template
    name: "Dew Point"
    id: dew_point
    unit_of_measurement: "C"
    device_class: temperature
    accuracy_decimals: 1
    update_interval: 60s
    lambda: |-
      float T = id(temperature).state, RH = id(humidity).state;
      float g = (17.27f*T/(237.7f+T)) + logf(RH/100.0f);
      return 237.7f*g/(17.27f-g);

  - platform: template
    name: "Feels Like"
    id: feels_like
    unit_of_measurement: "C"
    device_class: temperature
    accuracy_decimals: 1
    update_interval: 60s
    lambda: |-
      float T = id(temperature).state, RH = id(humidity).state;
      if (T < 27.0f || RH < 40.0f) return T;
      float Tf = T*9.0f/5.0f+32.0f;
      float HI = -42.379f+2.049f*Tf+10.143f*RH-0.2248f*Tf*RH-6.838e-3f*Tf*Tf-5.482e-2f*RH*RH+1.229e-3f*Tf*Tf*RH+8.528e-4f*Tf*RH*RH-1.99e-6f*Tf*Tf*RH*RH;
      return (HI-32.0f)*5.0f/9.0f;

  - platform: template
    name: "PM2.5 AQI"
    id: pm25_aqi
    accuracy_decimals: 0
    update_interval: 60s
    lambda: |-
      float c = id(pm25).state;
      if (c <= 9.0f)   return (50.0f/9.0f)*c;
      if (c <= 35.4f)  return 51.0f+(49.0f/26.3f)*(c-9.1f);
      if (c <= 55.4f)  return 101.0f+(49.0f/19.9f)*(c-35.5f);
      if (c <= 125.4f) return 151.0f+(49.0f/69.9f)*(c-55.5f);
      if (c <= 225.4f) return 201.0f+(99.0f/99.9f)*(c-125.5f);
      return 301.0f+(199.0f/99.9f)*(c-225.5f);

  - platform: template
    name: "IAQ Score"
    id: aqi_score
    accuracy_decimals: 0
    update_interval: 60s
    lambda: |-
      auto interp = [](float x, float x0, float x1, float y0, float y1) -> float {
        if (x <= x0) return y0;
        if (x >= x1) return y1;
        return y0 + (y1 - y0) * ((x - x0) / (x1 - x0));
      };
      auto clamp_score = [](float x) -> float {
        if (x < 0.0f) return 0.0f;
        if (x > 100.0f) return 100.0f;
        return x;
      };

      float pm = id(pm25).state;
      float s_pm = 100.0f;
      if (!isnan(pm)) {
        if (pm <= 9.0f) s_pm = interp(pm, 0.0f, 9.0f, 100.0f, 88.0f);
        else if (pm <= 35.4f) s_pm = interp(pm, 9.0f, 35.4f, 88.0f, 55.0f);
        else if (pm <= 55.4f) s_pm = interp(pm, 35.4f, 55.4f, 55.0f, 35.0f);
        else if (pm <= 125.4f) s_pm = interp(pm, 55.4f, 125.4f, 35.0f, 15.0f);
        else s_pm = 8.0f;
      }

      float co = id(co2).state;
      float s_co2 = 100.0f;
      if (!isnan(co)) {
        if (co <= 600.0f) s_co2 = 100.0f;
        else if (co <= 800.0f) s_co2 = interp(co, 600.0f, 800.0f, 100.0f, 86.0f);
        else if (co <= 1000.0f) s_co2 = interp(co, 800.0f, 1000.0f, 86.0f, 70.0f);
        else if (co <= 1500.0f) s_co2 = interp(co, 1000.0f, 1500.0f, 70.0f, 42.0f);
        else if (co <= 2000.0f) s_co2 = interp(co, 1500.0f, 2000.0f, 42.0f, 22.0f);
        else s_co2 = 8.0f;
      }

      float v = id(voc_idx).state;
      float s_voc = 100.0f;
      if (!isnan(v)) {
        if (v <= 100.0f) s_voc = 100.0f;
        else if (v <= 150.0f) s_voc = interp(v, 100.0f, 150.0f, 100.0f, 85.0f);
        else if (v <= 250.0f) s_voc = interp(v, 150.0f, 250.0f, 85.0f, 60.0f);
        else if (v <= 400.0f) s_voc = interp(v, 250.0f, 400.0f, 60.0f, 35.0f);
        else s_voc = 15.0f;
      }

      float n = id(nox_idx).state;
      float s_nox = 100.0f;
      if (!isnan(n)) {
        if (n <= 1.5f) s_nox = 100.0f;
        else if (n <= 20.0f) s_nox = interp(n, 1.5f, 20.0f, 100.0f, 88.0f);
        else if (n <= 100.0f) s_nox = interp(n, 20.0f, 100.0f, 88.0f, 55.0f);
        else if (n <= 250.0f) s_nox = interp(n, 100.0f, 250.0f, 55.0f, 30.0f);
        else s_nox = 15.0f;
      }

      bool gas_base_ok = id(co_gas_baseline) > 0.01f && id(nh3_gas_baseline) > 0.01f && id(no2_gas_baseline) > 0.01f;
      float g = id(gas_index).state;
      float s_gas = 100.0f;
      if (gas_base_ok && !isnan(g)) {
        if (g <= 10.0f) s_gas = 100.0f;
        else if (g <= 35.0f) s_gas = interp(g, 10.0f, 35.0f, 100.0f, 82.0f);
        else if (g <= 75.0f) s_gas = interp(g, 35.0f, 75.0f, 82.0f, 58.0f);
        else if (g <= 150.0f) s_gas = interp(g, 75.0f, 150.0f, 58.0f, 32.0f);
        else s_gas = 15.0f;
      }

      float rh = id(humidity).state;
      float s_humi = 100.0f;
      if (!isnan(rh)) {
        float dry_penalty = rh < 35.0f ? (35.0f - rh) * 2.2f : 0.0f;
        float damp_penalty = rh > 60.0f ? (rh - 60.0f) * 2.5f : 0.0f;
        s_humi = clamp_score(100.0f - dry_penalty - damp_penalty);
      }

      float weighted = s_pm*0.36f + s_co2*0.30f + s_voc*0.14f + s_nox*0.07f + s_gas*0.08f + s_humi*0.05f;
      float worst = fminf(s_pm, fminf(s_co2, fminf(s_voc, fminf(s_nox, s_gas))));
      float score = weighted * 0.65f + worst * 0.35f;
      if (worst < 35.0f && score > 45.0f) score = 45.0f;
      if (worst < 55.0f && score > 65.0f) score = 65.0f;
      return clamp_score(score);

  - platform: template
    name: "Battery Hours"
    id: battery_hrs
    unit_of_measurement: "h"
    accuracy_decimals: 1
    update_interval: 60s
