################################################################################
#  Portable Air Quality Monitoring Station v3.2 | ESPHome 2026.4+ | FireBeetle 2 ESP32-E
#
#  Sanitized public example:
#  - Copy secrets.yaml.example to secrets.yaml and fill in your own values.
#  - Add your own fonts and AirIcons assets, or remove/comment those sections.
#  - Update timezone and outdoor_weather_entity for your Home Assistant setup.
################################################################################
substitutions:
  device_name: portable-air-quality-station
  friendly_name: Portable Air Quality Monitoring Station
  co2_cal_ppm: "420"
  battery_mah: "4000"
  timezone: "Etc/UTC"
  outdoor_weather_entity: weather.home

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: -10
    then:
      - component.update: uptime_sensor
      - lambda: |-
          if (esp_sleep_get_wakeup_cause() == ESP_SLEEP_WAKEUP_TIMER) {
            id(deep_sleep_mode) = true;
          } else {
            id(deep_sleep_mode) = false;
          }
          id(last_alert_ts) = -1800.0f;
          id(is_charging) = false;
      - lambda: |-
          id(backlight_pct) = 100.0f;
          auto call = id(backlight).make_call();
          call.set_state(true);
          call.set_brightness(1.0f);
          call.perform();
      - delay: 3s
      - display.page.show: page_home
      - component.update: tft_display
      - delay: 500ms
      - script.execute: force_boot_brightness

preferences:
  flash_write_interval: 48h

esp32:
  board: firebeetle32
  framework:
    type: arduino

logger:
  baud_rate: 0
  level: INFO

api:
  encryption:
    key: !secret api_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: LIGHT
  fast_connect: true
  reboot_timeout: 0s
  ap:
    ssid: "Portable AQ Setup"
    password: !secret ap_password
    ap_timeout: 2min
captive_portal:

time:
  - platform: sntp
    id: ha_time
    timezone: "${timezone}"

i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true
  id: bus_a

ads1115:
  - address: 0x48
    continuous_mode: false

uart:
  rx_pin: GPIO3
  tx_pin:
    number: GPIO1
    allow_other_uses: true
  baud_rate: 9600

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO19

deep_sleep:
  id: deep_sleep_1
  sleep_duration: 3min

globals:
  - id: deep_sleep_mode
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: battery_save_mode
    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: away_mode
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: is_charging
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: prev_battery_v
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: charge_rise_count
    type: int
    restore_value: no
    initial_value: '0'
  - id: charge_fall_count
    type: int
    restore_value: no
    initial_value: '0'
  - id: backlight_pct
    type: float
    restore_value: yes
    initial_value: '80'
  - id: led_pct
    type: float
    restore_value: yes
    initial_value: '30'
  - id: screen_timeout_on
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: screen_timeout_seconds
    type: int
    restore_value: yes
    initial_value: '30'
  - id: sound_on
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: use_fahrenheit
    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: wifi_enabled
    type: bool
    restore_value: no
    initial_value: 'true'
  - id: co2_alert_ppm
    type: int
    restore_value: yes
    initial_value: '1000'
  - id: pm25_alert_ugm3
    type: float
    restore_value: yes
    initial_value: '12.0'
  - id: voc_alert_idx
    type: int
    restore_value: yes
    initial_value: '250'
  - id: last_alert_ts
    type: float
    restore_value: no
    initial_value: '-1800.0'
  - id: co2_daily_min
    type: float
    restore_value: no
    initial_value: '9999.0'
  - id: co2_daily_max
    type: float
    restore_value: no
    initial_value: '-1.0'
  - id: pm25_daily_min
    type: float
    restore_value: no
    initial_value: '9999.0'
  - id: pm25_daily_max
    type: float
    restore_value: no
    initial_value: '-1.0'
  - id: temp_daily_min
    type: float
    restore_value: no
    initial_value: '999.0'
  - id: temp_daily_max
    type: float
    restore_value: no
    initial_value: '-999.0'
  - id: voc_10min_ago
    type: float
    restore_value: no
    initial_value: '100.0'
  - id: pm_warmed_up
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: co2_stable
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: last_alert_msg
    type: std::string
    restore_value: no
    initial_value: '"No alerts"'
  - id: temp_baseline_offset_c
    type: float
    restore_value: yes
    initial_value: '-1.4'
  - id: self_heat_strength
    type: float
    restore_value: yes
    initial_value: '0.04'
  - id: graph_view
    type: int
    restore_value: yes
    initial_value: '0'
  - id: co_gas_baseline
    type: float
    restore_value: yes
    initial_value: '-1.0'
  - id: nh3_gas_baseline
    type: float
    restore_value: yes
    initial_value: '-1.0'
  - id: no2_gas_baseline
    type: float
    restore_value: yes
    initial_value: '-1.0'

