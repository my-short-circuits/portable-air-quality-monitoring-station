          if (gv == 0) {
            char right[32];
            snprintf(right, sizeof(right), "H %.0f  L %.0f", id(co2_daily_max)>0?id(co2_daily_max):0, id(co2_daily_min)<9000?id(co2_daily_min):0);
            char title[32];
            snprintf(title, sizeof(title), "CO2 %.0f ppm", id(co2).state);
            header(accents[0], title, right);
            it.graph(gx, gy, id(g_co2));
            axis(400, 1000, 3000, "ppm");
          } else if (gv == 1) {
            char right[24];
            snprintf(right, sizeof(right), "AQI %.0f", id(pm25_aqi).state);
            char title[32];
            snprintf(title, sizeof(title), "PM2.5 %.1f ug/m3", id(pm25).state);
            header(accents[1], title, right);
            it.graph(gx, gy, id(g_pm));
            axis(0, 35, 72, "ug");
          } else if (gv == 2) {
            float vd = id(voc_idx).state - id(voc_10min_ago);
            char right[24];
            snprintf(right, sizeof(right), "10m %+.0f", vd);
            char title[32];
            snprintf(title, sizeof(title), "VOC %.0f index", id(voc_idx).state);
            header(accents[2], title, right);
            it.graph(gx, gy, id(g_voc));
            axis(0, 250, 500, "idx");
          } else if (gv == 3) {
            char right[32];
            snprintf(right, sizeof(right), "H %.1f  L %.1f", id(temp_daily_max)<900?id(temp_daily_max):0, id(temp_daily_min)<900?id(temp_daily_min):0);
            char title[32];
            snprintf(title, sizeof(title), "Indoor %.1fC", id(temperature).state);
            header(accents[3], title, right);
            it.graph(gx, gy, id(g_temp));
            axis(10, 22, 35, "C");
          } else if (gv == 4) {
            char right[24];
            snprintf(right, sizeof(right), "Dew %.1fC", id(dew_point).state);
            char title[32];
            snprintf(title, sizeof(title), "Humidity %.0f%% RH", id(humidity).state);
            header(accents[4], title, right);
            it.graph(gx, gy, id(g_humidity));
            axis(0, 50, 100, "%");
          } else {
            char right[24];
            snprintf(right, sizeof(right), "%s", id(gas_status).state.c_str());
            char title[32];
            snprintf(title, sizeof(title), "Gas %.0f%%", id(gas_index).state);
            header(accents[5], title, right);
            it.graph(gx, gy, id(g_gas));
            axis(0, 100, 200, "%");
          }
          it.print(gx, 190, id(f_small), DIM, "4 hours");
          it.print(gx + gw, 190, id(f_small), DIM, TextAlign::RIGHT, "now");
          it.line(gx, gy - 2, gx + gw, gy - 2, LINE);
          it.line(gx, gy + gh + 2, gx + gw, gy + gh + 2, LINE);
          it.filled_rectangle(112, 214, 96, 22, Color(18,22,32));
          it.rectangle(112, 214, 96, 22, Color(38,76,112));
          it.print(160, 225, id(f_small), W, TextAlign::CENTER, "< Back");

