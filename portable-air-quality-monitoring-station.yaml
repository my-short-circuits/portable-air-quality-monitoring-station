  - platform: internal_temperature
    name: "ESP32 Die Temp"
    id: esp32_temp
    update_interval: 60s
  - platform: template
    name: "Self-Heat Correction"
    id: self_heat_correction
    unit_of_measurement: "C"
    accuracy_decimals: 2
    entity_category: diagnostic
    update_interval: 30s
    lambda: |-
      float raw_t = id(temperature_raw).state;
      float die_t = id(esp32_temp).state;
      if (isnan(raw_t) || isnan(die_t)) return 0.0f;
      float delta = die_t - raw_t;
      float extra = (delta - 18.0f) * id(self_heat_strength);
      if (extra < 0.0f) extra = 0.0f;
      if (extra > 2.5f) extra = 2.5f;
      return extra;
  - platform: template
    name: "Temperature"
    id: temperature
    unit_of_measurement: "C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 30s
    lambda: |-
      float raw_t = id(temperature_raw).state;
      if (isnan(raw_t)) return NAN;
      float dynamic = id(self_heat_correction).state;
      if (isnan(dynamic)) dynamic = 0.0f;
      return raw_t + id(temp_baseline_offset_c) - dynamic;
    on_value:
      then:
        - lambda: |-
            if (x < id(temp_daily_min)) id(temp_daily_min) = x;
            if (x > id(temp_daily_max)) id(temp_daily_max) = x;
  - platform: template
    name: "Humidity"
    id: humidity
    unit_of_measurement: "%"
    device_class: humidity
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 30s
    lambda: |-
      float raw_t = id(temperature_raw).state;
      float raw_rh = id(humidity_raw).state;
      float corrected_t = id(temperature).state;
      if (isnan(raw_t) || isnan(raw_rh) || isnan(corrected_t)) return NAN;
      const float a = 17.625f;
      const float b = 243.04f;
      float svp_raw = expf((a * raw_t) / (b + raw_t));
      float vapor_pressure = (raw_rh / 100.0f) * svp_raw;
      float svp_corrected = expf((a * corrected_t) / (b + corrected_t));
      float corrected_rh = 100.0f * vapor_pressure / svp_corrected;
      if (corrected_rh < 0.0f) corrected_rh = 0.0f;
      if (corrected_rh > 100.0f) corrected_rh = 100.0f;
      return corrected_rh;
