      - id: page_battery
        lambda: |-
          it.fill(Color(8,8,15));
          it.filled_rectangle(0, 0, 320, 24, Color(20,80,20));
          it.print(160, 12, id(f_body), Color(240,240,255), TextAlign::CENTER, "Battery");
          float bp = id(battery_pct).state;
          float bv = id(battery_v).state;
          float pct = bp;
          if (isnan(pct)) pct = 0.0f;
          if (pct < 0.0f) pct = 0.0f;
          if (pct > 100.0f) pct = 100.0f;
          Color bc = pct<15?Color(255,40,40):pct<35?Color(255,140,0):pct<60?Color(255,220,0):Color(40,210,80);
          int bx = 46;
          int by = 38;
          int bw = 220;
          int bh = 72;
          int capw = 10;
          it.rectangle(bx, by, bw, bh, bc);
          it.rectangle(bx+1, by+1, bw-2, bh-2, bc);
          it.filled_rectangle(bx + bw, by + 22, capw, bh - 44, bc);
          it.filled_rectangle(bx + 5, by + 5, bw - 10, bh - 10, Color(18,24,28));
          int fill = (int)((bw - 10) * pct / 100.0f);
          if (fill < 3 && pct > 0.0f) fill = 3;
          it.filled_rectangle(bx + 5, by + 5, fill, bh - 10, bc);
          it.printf(bx + bw / 2, by + 34, id(f_large), Color(255,255,255), TextAlign::CENTER, "%.0f%%", pct);
          it.print(160, 116, id(f_small), id(is_charging) ? Color(90,230,120) : Color(160,160,180), TextAlign::CENTER, id(is_charging) ? "Charging - voltage estimate" : "Voltage estimate");
          it.printf(160, 128, id(f_small), Color(160,160,185), TextAlign::CENTER, "%.2fV  Eco %s  runtime varies", bv, id(battery_save_mode)?"on":"off");
          it.filled_rectangle(10, 136, 300, 8, Color(30,35,50));
          it.filled_rectangle(10, 136, (int)(pct/100*300), 8, bc);
          it.graph(10, 148, id(g_battery));
          it.filled_rectangle(112, 214, 96, 22, Color(18,22,32));
          it.rectangle(112, 214, 96, 22, Color(20,100,45));
          it.print(160, 225, id(f_small), Color(240,240,255), TextAlign::CENTER, "< Back");

