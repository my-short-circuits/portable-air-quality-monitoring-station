    update_interval: 60s
    lambda: |-
      float T=id(temperature).state, RH=id(humidity).state;
      if (T<16) return {"Too Cold"};
      if (T>30) return {"Too Hot"};
      if (RH<25) return {"Very Dry"};
      if (RH>70) return {"Very Humid"};
      if (T>=19&&T<=25&&RH>=35&&RH<=60) return {"Comfortable"};
      if (RH<35) return {"Dry"};
      if (RH>60) return {"Humid"};
      if (T<19) return {"Cool"};
      return {"Warm"};
