output:
  - platform: gpio
    pin: GPIO15
    id: gpio_15
  - platform: ledc
    pin: GPIO12
    id: backlight_pwm
    frequency: 1000Hz
  - platform: ledc
    pin: GPIO13
    id: buzzer_pwm
    frequency: 800Hz

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Portable AQ Backlight"
    id: backlight
    restore_mode: ALWAYS_ON
    default_transition_length: 300ms
  - platform: neopixelbus
    type: GRB
    id: status_led
    variant: WS2812
    pin: GPIO5
    num_leds: 1
    name: "Portable AQ Status LED"
    restore_mode: ALWAYS_ON
    default_transition_length: 500ms
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 1500ms
          update_interval: 2000ms
      - pulse:
          name: "Fast Pulse"
          transition_length: 300ms
          update_interval: 400ms

