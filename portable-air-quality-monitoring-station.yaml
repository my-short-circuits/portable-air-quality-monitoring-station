sensor:
  - platform: scd4x
    id: scd41
    measurement_mode: low_power_periodic
    altitude_compensation: 50m
    automatic_self_calibration: true
    update_interval: 60s
    co2:
      name: "CO2"
      id: co2
      device_class: carbon_dioxide
      state_class: measurement
      unit_of_measurement: "ppm"
      on_value:
        then:
          - lambda: |-
              if (x < id(co2_daily_min)) id(co2_daily_min) = x;
              if (x > id(co2_daily_max)) id(co2_daily_max) = x;
              if (!id(co2_stable) && id(uptime_sensor).state > 180) id(co2_stable) = true;
    temperature:
      name: "SCD41 Temp"
      id: scd41_temp
      internal: true
    humidity:
      name: "SCD41 Hum"
      id: scd41_hum
      internal: true

  - platform: sht3xd
    address: 0x44
    update_interval: 30s
    heater_enabled: false
    temperature:
      name: "Raw Temperature"
      id: temperature_raw
      device_class: temperature
      state_class: measurement
      internal: true
      filters:
        - sliding_window_moving_average:
            window_size: 3
            send_every: 1
    humidity:
      name: "Raw Humidity"
      id: humidity_raw
      device_class: humidity
      state_class: measurement
      internal: true

  - platform: sgp4x
    update_interval: 60s
    store_baseline: true
    compensation:
      temperature_source: scd41_temp
      humidity_source: scd41_hum
    voc:
      name: "VOC Index"
      id: voc_idx
      device_class: aqi
      state_class: measurement
    nox:
      name: "NOx Index"
      id: nox_idx
      state_class: measurement

  - platform: sps30
    id: sps30_sensor
    address: 0x69
    update_interval: 10s
    idle_interval: 5min
    pm_1_0:
      name: "PM 1.0"
      id: pm1
      device_class: pm1
      state_class: measurement
      on_value:
        then:
          - lambda: |-
              if (!id(pm_warmed_up) && id(uptime_sensor).state > 30) id(pm_warmed_up) = true;
    pm_2_5:
      name: "PM 2.5"
      id: pm25
      device_class: pm25
      state_class: measurement
      accuracy_decimals: 1
      on_value:
        then:
          - lambda: |-
              if (x < id(pm25_daily_min)) id(pm25_daily_min) = x;
              if (x > id(pm25_daily_max)) id(pm25_daily_max) = x;
    pm_4_0:
      name: "PM 4.0"
      id: pm4
      state_class: measurement
    pm_10_0:
      name: "PM 10"
      id: pm10
      device_class: pm10
      state_class: measurement
    pmc_0_5:
      name: "PM 0.5um Count"
      id: pm05_num
      state_class: measurement
    pmc_1_0:
      name: "PM 1.0um Count"
      id: pm10_num
      state_class: measurement
    pmc_2_5:
      name: "PM 2.5um Count"
      id: pm25_num
      state_class: measurement
    pmc_4_0:
      name: "PM 4.0um Count"
      id: pm40_num
      state_class: measurement
    pmc_10_0:
      name: "PM 10um Count"
      id: pm100_num
      state_class: measurement
    pm_size:
      name: "Typical Particle Size"
      id: pm_size
      state_class: measurement
      unit_of_measurement: "um"

  - platform: ccs811
    id: ccs811_sensor
    address: 0x5A
    update_interval: 30s
    # Replace with your own learned CCS811 baseline or remove this line.
    baseline: 0x45B8
    temperature: scd41_temp
    humidity: scd41_hum
    eco2:
      name: "CCS811 eCO2"
      id: eco2_ccs
      unit_of_measurement: "ppm"
      state_class: measurement
      internal: true
    tvoc:
      name: "CCS811 TVOC"
      id: tvoc_ccs
      unit_of_measurement: "ppb"
      state_class: measurement
      filters:
        - sliding_window_moving_average:
            window_size: 4
            send_every: 1

  - platform: ads1115
    multiplexer: 'A2_GND'
    gain: 4.096
    name: "CO relative"
    id: co_raw
    update_interval: 30s
    unit_of_measurement: "rel"
    state_class: measurement
    filters:
      - median:
          window_size: 5
          send_every: 1
          send_first_at: 1
      - sliding_window_moving_average:
          window_size: 12
          send_every: 2
      - lambda: return (x * 3.4f * (2500000.0f * (0.256f / 32767.0f)));
  - platform: ads1115
    multiplexer: 'A1_GND'
    gain: 4.096
    name: "NH3 relative"
    id: nh3_raw
    update_interval: 30s
    unit_of_measurement: "rel"
    state_class: measurement
    filters:
      - median:
          window_size: 5
          send_every: 1
          send_first_at: 1
      - sliding_window_moving_average:
          window_size: 12
          send_every: 2
      - lambda: return (x * 1000.0f * (4000.0f * (0.256f / 32767.0f)));
  - platform: ads1115
    multiplexer: 'A0_GND'
    gain: 4.096
    name: "NO2 relative"
    id: no2_raw
    update_interval: 30s
    unit_of_measurement: "rel"
    state_class: measurement
    filters:
      - median:
          window_size: 5
          send_every: 1
          send_first_at: 1
      - sliding_window_moving_average:
          window_size: 12
          send_every: 2
      - lambda: return (x * 1000000.0f * (20.0f * (0.256f / 32767.0f)));

  - platform: template
    name: "Gas Environment Factor"
    id: gas_env_factor
    internal: true
    accuracy_decimals: 3
    update_interval: 60s
    lambda: |-
      float t = id(temperature).state;
      float rh = id(humidity).state;
      if (isnan(t) || isnan(rh)) return 1.0f;
      // Conservative drift dampening only. These sensors still need a clean-air baseline.
      float factor = 1.0f + (t - 20.0f) * 0.006f + (rh - 50.0f) * 0.003f;
      if (factor < 0.80f) factor = 0.80f;
      if (factor > 1.25f) factor = 1.25f;
      return factor;

  - platform: template
    name: "CO Baseline Change"
    id: co_gas_index
    unit_of_measurement: "%"
    accuracy_decimals: 0
    state_class: measurement
    update_interval: 60s
    lambda: |-
      float raw = id(co_raw).state;
      float base = id(co_gas_baseline);
      float factor = id(gas_env_factor).state;
      if (isnan(raw) || base <= 0.01f) return 0.0f;
      if (isnan(factor) || factor < 0.20f) factor = 1.0f;
      float pct = ((raw / factor) / base - 1.0f) * 100.0f;
      if (pct < 0.0f) pct = 0.0f;
      if (pct > 300.0f) pct = 300.0f;
      return pct;
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1

  - platform: template
    name: "NH3 Baseline Change"
    id: nh3_gas_index
    unit_of_measurement: "%"
    accuracy_decimals: 0
    state_class: measurement
    update_interval: 60s
    lambda: |-
      float raw = id(nh3_raw).state;
      float base = id(nh3_gas_baseline);
      float factor = id(gas_env_factor).state;
      if (isnan(raw) || base <= 0.01f) return 0.0f;
      if (isnan(factor) || factor < 0.20f) factor = 1.0f;
      float pct = ((raw / factor) / base - 1.0f) * 100.0f;
      if (pct < 0.0f) pct = 0.0f;
      if (pct > 300.0f) pct = 300.0f;
      return pct;
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1

  - platform: template
    name: "NO2 Baseline Change"
    id: no2_gas_index
    unit_of_measurement: "%"
    accuracy_decimals: 0
    state_class: measurement
    update_interval: 60s
    lambda: |-
      float raw = id(no2_raw).state;
      float base = id(no2_gas_baseline);
      float factor = id(gas_env_factor).state;
      if (isnan(raw) || base <= 0.01f) return 0.0f;
      if (isnan(factor) || factor < 0.20f) factor = 1.0f;
      float pct = ((raw / factor) / base - 1.0f) * 100.0f;
      if (pct < 0.0f) pct = 0.0f;
      if (pct > 300.0f) pct = 300.0f;
      return pct;
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1

  - platform: template
    name: "Gas Index"
    id: gas_index
    unit_of_measurement: "%"
    accuracy_decimals: 0
    state_class: measurement
    update_interval: 60s
    lambda: |-
      float co = id(co_gas_index).state;
      float nh3 = id(nh3_gas_index).state;
      float no2 = id(no2_gas_index).state;
      if (isnan(co)) co = 0.0f;
      if (isnan(nh3)) nh3 = 0.0f;
      if (isnan(no2)) no2 = 0.0f;
      float worst = fmaxf(co, fmaxf(nh3, no2));
      float avg = (co + nh3 + no2) / 3.0f;
      return worst * 0.70f + avg * 0.30f;

  - platform: adc
    pin: GPIO34
    name: "Battery Voltage"
    id: battery_v
    attenuation: 12dB
    update_interval: 10s
    accuracy_decimals: 2
    internal: true
    filters:
      - multiply: 2.0
      - sliding_window_moving_average:
          window_size: 6
          send_every: 3
      - clamp:
          min_value: 2.8
          max_value: 4.5
      - lambda: |-
          float prev = id(prev_battery_v);
          if (prev > 0.1f) {
            float delta = x - prev;
            bool charging_trend = x > 3.55f && delta > 0.012f;
            if (charging_trend) {
              id(charge_rise_count)++;
              id(charge_fall_count) = 0;
            } else {
              id(charge_fall_count)++;
              if (id(charge_rise_count) > 1) id(charge_rise_count) -= 2;
              else id(charge_rise_count) = 0;
            }
            if (id(charge_rise_count) >= 4) id(is_charging) = true;
            if (id(charge_fall_count) >= 4 || delta < -0.010f) {
              id(is_charging) = false;
              id(charge_rise_count) = 0;
            }
          }
          id(prev_battery_v) = x;
          return x;

  - platform: template
    id: battery_v_clamped
    internal: true
    lambda: |-
      float v = id(battery_v).state;
      if (v < 3.30f) return 3.30f;
      if (v > 4.20f) return 4.20f;
      return v;
    update_interval: 10s

  - platform: template
    name: "Battery"
    id: battery_pct
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 15s
    lambda: |-
      float v = id(battery_v_clamped).state;
      if (v >= 4.20f) return 100.0f;
      if (v >= 4.10f) return 90.0f + (v - 4.10f) / 0.10f * 10.0f;
      if (v >= 4.00f) return 80.0f + (v - 4.00f) / 0.10f * 10.0f;
      if (v >= 3.90f) return 65.0f + (v - 3.90f) / 0.10f * 15.0f;
      if (v >= 3.80f) return 50.0f + (v - 3.80f) / 0.10f * 15.0f;
      if (v >= 3.70f) return 30.0f + (v - 3.70f) / 0.10f * 20.0f;
      if (v >= 3.60f) return 15.0f + (v - 3.60f) / 0.10f * 15.0f;
      if (v >= 3.50f) return 7.0f  + (v - 3.50f) / 0.10f * 8.0f;
      if (v >= 3.30f) return (v - 3.30f) / 0.20f * 7.0f;
      return 0.0f;

  - platform: uptime
