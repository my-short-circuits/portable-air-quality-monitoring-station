      }
      float g = id(gas_index).state;
      if (isnan(g)) return {"Waiting"};
      if (g < 10.0f) return {"Stable"};
      if (g < 35.0f) return {"Slight rise"};
      if (g < 75.0f) return {"Elevated"};
