touchscreen:
  platform: xpt2046
  id: tft_touch
  cs_pin: 4
  update_interval: 50ms
  threshold: 420
  display: tft_display
  calibration:
    x_min: 280
    x_max: 3860
    y_min: 0
    y_max: 3860
  transform:
    mirror_x: true
    mirror_y: true
    swap_xy: true
  on_touch:
    - lambda: |-
        ESP_LOGI("cal", "x=%d, y=%d, raw=%d,%d", touch.x, touch.y, touch.x_raw, touch.y_raw);
    - lambda: |-
        auto call = id(backlight).make_call();
        call.set_state(true);
        call.set_brightness(id(away_mode) ? 0.18f : id(backlight_pct) / 100.0f);
        call.perform();
    - script.execute: reset_backlight_timer
    - script.execute: buzz_short

button:
  - platform: template
    name: "Calibrate CO2"
    on_press:
      - scd4x.perform_forced_calibration:
          value: ${co2_cal_ppm}
          id: scd41
  - platform: template
    name: "Clean PM Sensor"
    on_press:
      - sps30.start_fan_autoclean: sps30_sensor
  - platform: template
    name: "Set Gas Baseline"
    on_press:
      - script.execute: set_gas_baseline

switch:
  - platform: template
    name: "Battery Save"
    lambda: 'return id(battery_save_mode);'
    turn_on_action:
      - lambda: 'id(battery_save_mode) = true;'
      - script.execute: apply_battery_save_on
    turn_off_action:
      - lambda: 'id(battery_save_mode) = false;'
      - script.execute: apply_battery_save_off
  - platform: template
    name: "Dark Mode"
    lambda: 'return id(away_mode);'
    turn_on_action:
      - lambda: 'id(away_mode) = true;'
      - script.execute: apply_display_settings
    turn_off_action:
      - lambda: 'id(away_mode) = false;'
      - script.execute: apply_display_settings
  - platform: template
    name: "Sound"
    lambda: 'return id(sound_on);'
    turn_on_action:
      - lambda: 'id(sound_on) = true;'
    turn_off_action:
      - lambda: 'id(sound_on) = false;'
  - platform: template
    name: "Deep Sleep"
    lambda: 'return id(deep_sleep_mode);'
    turn_on_action:
      - globals.set:
          id: deep_sleep_mode
          value: 'true'
    turn_off_action:
      - globals.set:
          id: deep_sleep_mode
          value: 'false'

number:
  - platform: template
    name: "CO2 Alert"
    min_value: 600
    max_value: 2500
    step: 50
    unit_of_measurement: "ppm"
    lambda: 'return id(co2_alert_ppm);'
    set_action:
      - lambda: 'id(co2_alert_ppm) = (int)x;'
  - platform: template
    name: "PM2.5 Alert"
    min_value: 5
    max_value: 75
    step: 1
    unit_of_measurement: "ug/m3"
    lambda: 'return id(pm25_alert_ugm3);'
    set_action:
      - lambda: 'id(pm25_alert_ugm3) = x;'
  - platform: template
    name: "Screen Timeout"
    min_value: 10
    max_value: 300
    step: 5
    unit_of_measurement: "s"
    lambda: 'return id(screen_timeout_seconds);'
    set_action:
      - lambda: 'id(screen_timeout_seconds) = (int)x;'
  - platform: template
    name: "Temperature Baseline Offset"
    min_value: -5
    max_value: 2
    step: 0.1
    unit_of_measurement: "C"
    lambda: 'return id(temp_baseline_offset_c);'
    set_action:
      - lambda: 'id(temp_baseline_offset_c) = x;'
  - platform: template
    name: "Self-Heat Strength"
    min_value: 0
    max_value: 0.15
    step: 0.01
    lambda: 'return id(self_heat_strength);'
    set_action:
      - lambda: 'id(self_heat_strength) = x;'

script:
  - id: force_boot_brightness
    then:
      - lambda: |-
          id(backlight_pct) = 100.0f;
          auto c = id(backlight).make_call();
          c.set_state(true);
          c.set_brightness(1.0f);
          c.perform();
  - id: apply_display_settings
    then:
      - lambda: |-
          float bl = id(away_mode) ? 0.0f : (id(backlight_pct) / 100.0f);
          auto c1 = id(backlight).make_call();
          c1.set_state(!id(away_mode)); c1.set_brightness(bl); c1.perform();
          float lp = id(away_mode) ? 0.0f : (id(led_pct) / 100.0f);
          auto c2 = id(status_led).make_call();
          c2.set_state(!id(away_mode)); c2.set_brightness(lp); c2.perform();
  - id: reset_backlight_timer
    mode: restart
    then:
      - delay: !lambda "return (uint32_t) id(screen_timeout_seconds) * 1000;"
      - lambda: |-
          if (id(screen_timeout_on) || id(away_mode)) {
            auto c = id(backlight).make_call();
            c.set_state(false); c.perform();
          }
  - id: buzz_short
    then:
      - if:
          condition:
            lambda: 'return id(sound_on);'
          then:
            - output.turn_on: buzzer_pwm
            - output.ledc.set_frequency:
                id: buzzer_pwm
                frequency: 1000Hz
            - output.set_level:
                id: buzzer_pwm
                level: 50%
            - delay: 100ms
            - output.turn_off: buzzer_pwm
  - id: buzz_double
    then:
      - script.execute: buzz_short
      - delay: 180ms
      - script.execute: buzz_short
  - id: set_gas_baseline
    then:
      - lambda: |-
          float factor = id(gas_env_factor).state;
          if (isnan(factor) || factor < 0.20f) factor = 1.0f;
          if (!isnan(id(co_raw).state) && id(co_raw).state > 0.0f) {
            id(co_gas_baseline) = id(co_raw).state / factor;
          }
          if (!isnan(id(nh3_raw).state) && id(nh3_raw).state > 0.0f) {
            id(nh3_gas_baseline) = id(nh3_raw).state / factor;
          }
          if (!isnan(id(no2_raw).state) && id(no2_raw).state > 0.0f) {
            id(no2_gas_baseline) = id(no2_raw).state / factor;
          }
  - id: check_alerts
    then:
      - lambda: |-
          float now = id(uptime_sensor).state;
          if (now - id(last_alert_ts) < 1800.0f) return;
          if (id(co2).state > 2000 || id(pm25).state > 55) {
            id(buzz_double).execute();
            id(last_alert_ts) = now;
            char b[48]; snprintf(b, 48, "DANGER CO2=%.0f PM=%.1f", id(co2).state, id(pm25).state);
            id(last_alert_msg) = std::string(b);
          } else if (id(co2).state > id(co2_alert_ppm) || id(pm25).state > id(pm25_alert_ugm3)) {
            id(buzz_short).execute();
            id(last_alert_ts) = now;
            char b[48]; snprintf(b, 48, "Alert CO2=%.0f PM=%.1f", id(co2).state, id(pm25).state);
            id(last_alert_msg) = std::string(b);
          }
  - id: update_led
    then:
      - lambda: |-
          if (id(away_mode)) return;
          if (id(led_pct) < 1) return;
          float s = id(aqi_score).state;
          float br = id(led_pct) / 100.0f;
          auto c = id(status_led).make_call();
          c.set_state(true); c.set_brightness(br);
          if (s>=85)      c.set_rgb(0,1,0);
          else if (s>=70) c.set_rgb(0.4,1,0);
          else if (s>=55) c.set_rgb(1,1,0);
          else if (s>=40) c.set_rgb(1,0.5,0);
          else            c.set_rgb(1,0,0);
          c.perform();
  - id: apply_battery_save_on
    then:
      - lambda: |-
          id(backlight_pct) = 40; id(led_pct) = 0;
          id(screen_timeout_on) = true;
          id(apply_display_settings).execute();
  - id: apply_battery_save_off
    then:
      - lambda: |-
          id(backlight_pct) = 80; id(led_pct) = 30;
          id(apply_display_settings).execute();
  - id: toggle_wifi
    then:
      - if:
          condition:
            lambda: 'return id(wifi_enabled);'
          then:
            - wifi.enable:
          else:
            - wifi.disable:

interval:
  - interval: 30s
    then:
      - script.execute: check_alerts
      - script.execute: update_led
  - interval: 10min
    then:
      - lambda: 'id(voc_10min_ago) = id(voc_idx).state;'
  - interval: 5min
    then:
      - lambda: |-
          float factor = id(gas_env_factor).state;
          if (isnan(factor) || factor < 0.20f) factor = 1.0f;
          if (id(uptime_sensor).state > 1200.0f &&
              (id(co_gas_baseline) <= 0.01f || id(nh3_gas_baseline) <= 0.01f || id(no2_gas_baseline) <= 0.01f)) {
            id(set_gas_baseline).execute();
            return;
          }
          if (id(co_gas_baseline) <= 0.01f || id(nh3_gas_baseline) <= 0.01f || id(no2_gas_baseline) <= 0.01f) return;
          if (id(gas_index).state > 10.0f) return;
          float co = id(co_raw).state / factor;
          float nh3 = id(nh3_raw).state / factor;
          float no2 = id(no2_raw).state / factor;
          if (!isnan(co) && co > 0.0f) {
            float a = co < id(co_gas_baseline) ? 0.010f : 0.002f;
            id(co_gas_baseline) = id(co_gas_baseline) * (1.0f - a) + co * a;
          }
          if (!isnan(nh3) && nh3 > 0.0f) {
            float a = nh3 < id(nh3_gas_baseline) ? 0.010f : 0.002f;
            id(nh3_gas_baseline) = id(nh3_gas_baseline) * (1.0f - a) + nh3 * a;
          }
          if (!isnan(no2) && no2 > 0.0f) {
            float a = no2 < id(no2_gas_baseline) ? 0.010f : 0.002f;
            id(no2_gas_baseline) = id(no2_gas_baseline) * (1.0f - a) + no2 * a;
          }
  - interval: 60s
    then:
      - lambda: |-
          auto t = id(ha_time).now();
          if (t.is_valid() && t.hour == 0 && t.minute == 0) {
            id(co2_daily_min) = 9999; id(co2_daily_max) = -1;
            id(pm25_daily_min) = 9999; id(pm25_daily_max) = -1;
            id(temp_daily_min) = 999; id(temp_daily_max) = -999;
          }
  - interval: 60s
    then:
      - lambda: |-
          if (!id(is_charging) && id(battery_pct).state < 15 && !id(battery_save_mode)) {
            id(battery_save_mode) = true; id(apply_battery_save_on).execute();
          }
          if (id(is_charging) && id(battery_save_mode)) {
            id(battery_save_mode) = false; id(apply_battery_save_off).execute();
          }
  - interval: 40s
    then:
      - if:
          condition:
            lambda: 'return id(deep_sleep_mode);'
          then:
            - lambda: 'id(led_pct) = 0; id(apply_display_settings).execute();'
            - delay: 5s
            - deep_sleep.enter: deep_sleep_1

# Display pages are kept in the main YAML because the touchscreen coordinate
# handlers above reference page ids directly.
display:
  - platform: ili9xxx
    id: tft_display
    model: ILI9341
    cs_pin: 14
    dc_pin: 25
    reset_pin:
      number: 1
      allow_other_uses: true
    transform:
      mirror_x: true
      mirror_y: true
      swap_xy: true
    dimensions:
      height: 240
      width: 320
    invert_colors: false
    color_palette: 8BIT
    update_interval: 3s

    pages:
      - id: page_boot
        lambda: |-
          it.fill(Color(8,8,15));
          it.image(10, 50, id(img_logo));

      - id: page_home
        lambda: |-
          auto BG = Color(7,9,14);
          auto PANEL = Color(15,18,28);
          auto PANEL2 = Color(12,24,33);
          auto LINE = Color(45,54,72);
          auto W = Color(232,236,242);
          auto DIM = Color(135,145,160);
          auto MUTED = Color(86,96,112);
          it.fill(BG);

          it.filled_rectangle(0, 0, 320, 20, Color(12,15,24));
          float rssi = id(wifi_rssi).state;
          int bars = rssi>-55?4:rssi>-67?3:rssi>-78?2:rssi>-89?1:0;
          for (int b=0; b<4; b++) {
            it.filled_rectangle(6+b*6, 18-(4+b*3), 4, 4+b*3, b<bars?Color(0,190,220):Color(40,45,55));
          }
          auto t = id(ha_time).now();
          if (t.is_valid()) it.strftime(160, 10, id(f_small), W, TextAlign::CENTER, "%H:%M", t);
          float bp = id(battery_pct).state;
          float bp_draw = bp;
          if (isnan(bp_draw)) bp_draw = 0.0f;
          if (bp_draw < 0.0f) bp_draw = 0.0f;
          if (bp_draw > 100.0f) bp_draw = 100.0f;
          Color bc = bp_draw<15?Color(255,40,40):bp_draw<35?Color(255,140,0):Color(40,210,80);
          int bbx = 274;
          int bby = 3;
          int bbw = 32;
          int bbh = 14;
          int capw = 4;
          it.rectangle(bbx, bby, bbw, bbh, bc);
          it.filled_rectangle(bbx + bbw, bby + 4, capw, bbh - 8, bc);
          int fillw = (int)((bbw - 4) * bp_draw / 100.0f);
          if (fillw < 2 && bp_draw > 0.0f) fillw = 2;
          it.filled_rectangle(bbx + 2, bby + 2, fillw, bbh - 4, bc);
          it.printf(bbx + bbw / 2, bby + 8, id(f_small), Color(255,255,255), TextAlign::CENTER, "%.0f%%", bp_draw);
          if (id(is_charging)) {
            it.print(312, 10, id(f_small), Color(40,210,80), TextAlign::CENTER_RIGHT, "CHG");
          }

          float sc = id(aqi_score).state;
          Color hc;
          const char* cat;
          if      (sc>=85) { hc=Color(0,200,60);  cat="Excellent"; }
          else if (sc>=70) { hc=Color(120,220,0);  cat="Good"; }
          else if (sc>=55) { hc=Color(255,220,0);  cat="Moderate"; }
          else if (sc>=40) { hc=Color(255,120,0);  cat="Poor"; }
          else if (sc>=20) { hc=Color(255,30,30);  cat="Unhealthy"; }
          else             { hc=Color(140,0,60);    cat="Hazardous"; }
          float co2v = id(co2).state;
          float pmv = id(pm25).state;
          float vocv = id(voc_idx).state;
          float gasv = id(gas_index).state;
          if (isnan(gasv)) gasv = 0.0f;
          const char* cause = "Balanced";
          bool gas_base_ok = id(co_gas_baseline) > 0.01f && id(nh3_gas_baseline) > 0.01f && id(no2_gas_baseline) > 0.01f;
          if (!isnan(pmv) && pmv > id(pm25_alert_ugm3)) cause = "PM2.5 is driving score";
          else if (!isnan(co2v) && co2v > id(co2_alert_ppm)) cause = "CO2 is driving score";
          else if (!isnan(vocv) && vocv > id(voc_alert_idx)) cause = "VOC is driving score";
          else if (!isnan(id(nox_idx).state) && id(nox_idx).state > 100) cause = "NOx is elevated";
          else if (gas_base_ok && gasv > 35.0f) cause = "Gas trend is rising";
          else if (!isnan(id(humidity).state) && (id(humidity).state < 30 || id(humidity).state > 70)) cause = "Humidity is outside range";
          it.filled_rectangle(8, 26, 304, 54, PANEL);
          it.rectangle(8, 26, 304, 54, LINE);
          it.filled_rectangle(8, 26, 5, 54, hc);
          it.print(16, 34, id(f_small), DIM, "Air quality");
          it.printf(23, 57, id(f_med), hc, "%.0f", sc);
          it.print(78, 49, id(f_body), W, cat);
          it.printf(78, 65, id(f_small), DIM, "%s", cause);
          int meter_w = (int)(sc * 2.1f);
          if (meter_w < 0) meter_w = 0;
          if (meter_w > 210) meter_w = 210;
          it.filled_rectangle(96, 33, 210, 5, Color(33,39,52));
          it.filled_rectangle(96, 33, meter_w, 5, hc);

          auto climate_card = [&](int x, const char* title, float temp, float rh, Color accent, const char* detail) {
            it.filled_rectangle(x, 84, 148, 56, PANEL2);
            it.rectangle(x, 84, 148, 56, LINE);
            it.print(x+5, 90, id(f_small), DIM, title);
